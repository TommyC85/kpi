name: KPI Dashboard settimanale

on:
  schedule:
    - cron: "46 4 * * 1"   # lun 06:46 IT (dopo il Riepilogo delle 06:36)
    - cron: "46 5 * * 1"   # backup
  workflow_dispatch: {}

concurrency:
  group: kpi-dashboard
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Verifica secret (solo presenza e lunghezza, MAI i valori)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          WC_URL: ${{ secrets.WC_URL }}
          WC_KEY: ${{ secrets.WC_KEY }}
          WC_SECRET: ${{ secrets.WC_SECRET }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_DIR: ${{ secrets.FTP_DIR }}
          ODOO_URL: ${{ secrets.ODOO_URL }}
          ODOO_DB: ${{ secrets.ODOO_DB }}
          ODOO_USER: ${{ secrets.ODOO_USER }}
          ODOO_API_KEY: ${{ secrets.ODOO_API_KEY }}
        run: |
          for v in SUPABASE_URL SUPABASE_KEY WC_URL WC_KEY WC_SECRET FTP_HOST FTP_USER FTP_PASS FTP_DIR ODOO_URL ODOO_DB ODOO_USER ODOO_API_KEY; do
            val="${!v}"
            if [ -z "$val" ]; then echo "❌ $v = VUOTO"; else echo "✅ $v = presente (${#val} char)"; fi
          done

      - name: Genera dashboard KPI (scorecard 4 clienti)
        env:
          # Token Meta dal collegamento OAuth su Supabase (sola lettura).
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          WC_URL: ${{ secrets.WC_URL }}
          WC_KEY: ${{ secrets.WC_KEY }}
          WC_SECRET: ${{ secrets.WC_SECRET }}
          # Odoo Pontoni — SOLA LETTURA (funnel + trend costo/appuntamento).
          ODOO_URL: ${{ secrets.ODOO_URL }}
          ODOO_DB: ${{ secrets.ODOO_DB }}
          ODOO_USER: ${{ secrets.ODOO_USER }}
          ODOO_API_KEY: ${{ secrets.ODOO_API_KEY }}
        run: python kpi_run.py

      - name: Deploy su SiteGround (FTPS) — cartella /tommaso/kpi
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_DIR:  ${{ secrets.FTP_DIR }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          lftp -c "
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set ssl:verify-certificate no;
            open -u '$FTP_USER','$FTP_PASS' '$FTP_HOST';
            mkdir -f -p '$FTP_DIR/kpi';
            cd '$FTP_DIR/kpi';
            put -O . kpi/index.html;
            put -O . kpi/.htaccess;
          "
