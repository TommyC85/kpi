name: LearnDash Varini (settimanale)

on:
  schedule:
    - cron: "0 3 * * 1"   # lunedì notte (build pesante ~10 min, separato dal giro giornaliero)
  workflow_dispatch: {}

concurrency:
  group: learndash
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt

      - name: Costruisci mappa corsi + pagina (LearnDash, sola lettura)
        env:
          LD_VARINI_URL: ${{ secrets.LD_VARINI_URL }}
          LD_VARINI_USER: ${{ secrets.LD_VARINI_USER }}
          LD_VARINI_PASS: ${{ secrets.LD_VARINI_PASS }}
        run: python ld_run.py

      - name: Deploy su SiteGround (FTPS) — /tommaso/kpi/learndash
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_DIR:  ${{ secrets.FTP_DIR }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          lftp -c "
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set ssl:verify-certificate no;
            open -u '$FTP_USER','$FTP_PASS' '$FTP_HOST';
            mkdir -f -p '$FTP_DIR/kpi/learndash';
            cd '$FTP_DIR/kpi/learndash';
            put -O . ld/index.html;
            put -O . ld/.htaccess;
          "
