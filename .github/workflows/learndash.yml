name: Varini settimanale (Corsi + Riacquisti)

on:
  schedule:
    - cron: "0 3 * * 1"   # lunedì notte (build pesante ~15 min, separato dal giro giornaliero)
  workflow_dispatch: {}

concurrency:
  group: varini-weekly
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt

      - name: Corsi — mappa persona→corsi + pagina (LearnDash, sola lettura)
        env:
          LD_VARINI_URL: ${{ secrets.LD_VARINI_URL }}
          LD_VARINI_USER: ${{ secrets.LD_VARINI_USER }}
          LD_VARINI_PASS: ${{ secrets.LD_VARINI_PASS }}
        run: python ld_run.py

      - name: Riacquisti — storico ordini Woo + pagina
        env:
          WC_URL: ${{ secrets.WC_URL }}
          WC_KEY: ${{ secrets.WC_KEY }}
          WC_SECRET: ${{ secrets.WC_SECRET }}
        run: |
          python build_woo_orders.py
          python riacquisti_render.py

      - name: Deploy su SiteGround (FTPS) — /tommaso/kpi/{learndash,riacquisti}
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_DIR:  ${{ secrets.FTP_DIR }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          lftp -c "
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set ssl:verify-certificate no;
            open -u '$FTP_USER','$FTP_PASS' '$FTP_HOST';
            mkdir -f -p '$FTP_DIR/kpi/learndash';
            put -O '$FTP_DIR/kpi/learndash' ld/index.html;
            put -O '$FTP_DIR/kpi/learndash' ld/.htaccess;
            mkdir -f -p '$FTP_DIR/kpi/riacquisti';
            put -O '$FTP_DIR/kpi/riacquisti' riacquisti/index.html;
            put -O '$FTP_DIR/kpi/riacquisti' riacquisti/.htaccess;
          "
